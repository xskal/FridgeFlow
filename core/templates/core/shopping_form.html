{% extends 'core/base.html' %}

{% block title %}Добавить в список покупок - FridgeFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">🛒 Добавить в список покупок</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Продукт</label>
                        {{ form.ingredient }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Количество</label>
                        {{ form.quantity }}
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Добавить</button>
                        <a href="{% url 'core:shopping_list' %}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
